<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Stills - Colleen Asper: to catch the sounds that she can then give back with her own voice
    </title>
    <link rel="stylesheet" href="main.css?v=1.1">

</head>

<body class="stills-body striped-bg" id="stills-body">
    <a href="#main" class="skip-to-main-content-link">Skip to main content</a>

    <!-- Fixed diagonal stripes overlay -->
    <div class="stripe-overlay" id="stripe-overlay"></div>
    <header class="home-header">
        <!-- Live region: announces state changes to screen readers -->
        <div id="liveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>
        <nav class="top-nav striped-bg-nav">
            <div class="switch-row">
                <div class="warning-wrapper" id="warningWrapper">
                    <div class="warning-notice" role="note">
                        <span>
                            <strong>Photosensitivity warning</strong>: The background contains high contrast, flashing
                            patterns.
                        </span>
                    </div>
                </div>
                <div class="switch-toggle-wrapper">
                    <div class="switch-label-group">

                        <label class="switch-label" for="animToggle">
                            Enable background
                        </label>
                    </div>

                    <div class="switch-wrapper">
                        <input type="checkbox" id="animToggle" class="switch-input" role="switch">
                        <span class="switch-track" aria-hidden="true">
                            <span class="switch-thumb"></span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="striped-nav-sub">
                <a href="index.html">Back to Works</a>
                <a href="https://newmediaartspace.info">New Media Artspace</a>
            </div>
        </nav>
    </header>
    <main id="main">
        <h1 class="sr-only">Performance Stills</h1>
        <!-- Main content -->
        <div class="content">
            <div class="gallery">
                <!-- Column 1 (scrolls at 0.8x speed) -->
                <div class="column column-1">
                    <div class="gallery-item">
                        <img src="images/Colleen Asper wall.jpg" alt="Grey wall with two cut-outs, one of an ear and one of a mouth. Blue are inside the ears, and the mouth is surrounded by a block of yellow stripes, followed by some blue.">
                    </div>

                    <div class="gallery-item">
                        <img src="images/Colleen Asper wall 3.jpg" alt="Grey wall with two cut-outs, one of an ear and one of a mouth. Bright blue and yellow stripes are inside the ears, and the mouth is surrounded by muted blue, yellow, and red stripes.">
                    </div>
                    <div class="gallery-item">
                        <img src="images/Colleen Asper mouth transition.jpg" alt="Cut-out of a painting of a mouth with colorful stripes behind. The stripes on the top are bright pink, yellow, and blue. The ones in the bottom half are purple, yellow, and red.">
                    </div>
                    <div class="gallery-item">
                        <img src="images/Colleen Asper wall 4.jpg" alt="Grey wall with two cut-outs, one with an ear and one with a mouth. Grey stripes are inside the ears and surround the mouth.">
                    </div>

                </div>

                <!-- Column 2 (scrolls at 0.6x speed) -->
                <div class="column column-2">
                    <div class="gallery-item">
                        <img src="images/Colleen Asper wall with performer.jpg" alt="A grey wall with two cut-outs, one of an ear and one of a mouth. A performer is visible through slatted paper.">
                    </div>
                    <div class="gallery-item">
                        <img src="images/Colleen Asper mouth performer.jpg" alt="Legs wearing striped leggings visible through slatted paper, with a cut-out of a mouth in front.">
                    </div>
                    <div class="gallery-item">
                        <img src="images/Colleen Asper wall 2.jpg" alt="Grey wall with two cut-outs, one of an ear and one of a mouth. Red stripes are inside the ears and surround the mouth.">
                    </div>
                    <div class="gallery-item">
                        <img src="images/Colleen Asper reading music.jpg" alt="Colleen Asper reading music through a cut-out crossed with strips of paper.">
                    </div>
                    <div class="gallery-item">
                        <img src="images/Colleen Asper ear green and red.jpg" alt="Painting of ear framed by short grey hair with green and red stripes inside it.">
                    </div>

                </div>
            </div>
        </div>
        <script src="parallax.js"></script>
        <script src="striped-bg.js"></script>

</body>

</html>
